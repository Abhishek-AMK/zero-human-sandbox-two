<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Mode Button</title>
  <style>
    :root {
      --bg-start: #020617;
      --bg-end: #1e3a8a;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-border: rgba(255, 255, 255, 0.12);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --button-start: #8b5cf6;
      --button-end: #06b6d4;
      --ring: rgba(125, 211, 252, 0.95);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
    }

    .preview {
      width: min(100%, 420px);
      padding: 32px 24px;
      border-radius: 28px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 22px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--button-start), var(--button-end));
      box-shadow: 0 14px 34px rgba(6, 182, 212, 0.28), inset 0 1px 0 rgba(255,255,255,0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .button:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.06);
      box-shadow: 0 18px 40px rgba(6, 182, 212, 0.38), inset 0 1px 0 rgba(255,255,255,0.26);
    }

    .button:active {
      transform: translateY(0) scale(0.99);
      box-shadow: 0 10px 22px rgba(6, 182, 212, 0.25), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .button:focus-visible {
      outline: 2px solid transparent;
      box-shadow: 0 0 0 4px rgba(125, 211, 252, 0.2), 0 18px 40px rgba(6, 182, 212, 0.38), inset 0 1px 0 rgba(255,255,255,0.26);
    }

    @media (max-width: 480px) {
      .preview {
        padding: 28px 20px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="preview">
    <h1>Primary Action Button</h1>
    <p>Dark-mode friendly, polished, and built with smooth hover feedback.</p>
    <button class="button" type="button">Get Started</button>
  </main>
</body>
</html>
